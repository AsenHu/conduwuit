name: Upload Release Assets

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: get latest ci id
      id: get_ci_id
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        id=$(gh api repos/${{ github.repository }}/actions/workflows/ci.yml/runs -q '.workflow_runs[0].id')
        echo "ci_id=$id" >> "$GITHUB_OUTPUT"

    - name: get latest ci artifacts
      uses: actions/download-artifact@v4
      env:
        GH_TOKEN: ${{ github.token }}
      with:
        merge-multiple: true
        run-id: ${{ steps.get_ci_id.outputs.ci_id }}
        github-token: ${{ github.token }}

    - name: change name before upload
      run: |
        mv ./deb-aarch64-linux-musl             ./aarch64-unknown-linux-musl.deb
        mv ./deb-aarch64-linux-musl-debug       ./aarch64-unknown-linux-musl-debug.deb
        mv ./deb-x86_64-linux-musl              ./x86_64-unknown-linux-musl.deb
        mv ./deb-x86_64-linux-musl-debug        ./x86_64-unknown-linux-musl-debug.deb
        mv ./oci-image-aarch64-linux-musl       ./oci-image-aarch64-unknown-linux-musl.tar.gz
        mv ./oci-image-aarch64-linux-musl-debug ./oci-image-aarch64-unknown-linux-musl-debug.tar.gz
        mv ./oci-image-x86_64-linux-musl        ./oci-image-x86_64-unknown-linux-musl.tar.gz
        mv ./oci-image-x86_64-linux-musl-debug  ./oci-image-x86_64-unknown-linux-musl-debug.tar.gz
        mv ./static-aarch64-linux-musl          ./static-aarch64-unknown-linux-musl
        mv ./static-aarch64-linux-musl-debug    ./static-aarch64-unknown-linux-musl-debug
        mv ./static-x86_64-linux-musl           ./static-x86_64-unknown-linux-musl
        mv ./static-x86_64-linux-musl-debug     ./static-x86_64-unknown-linux-musl-debug

    - name: upload release assets
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh release upload ${{ github.event.release.tag_name }} "./aarch64-unknown-linux-musl.deb" \
          --clobber \
          --repo="${{github.repository}}"
        gh release upload ${{ github.event.release.tag_name }} "./aarch64-unknown-linux-musl-debug.deb" \
          --clobber \
          --repo="${{github.repository}}"
        gh release upload ${{ github.event.release.tag_name }} "./x86_64-unknown-linux-musl.deb" \
          --clobber \
          --repo="${{github.repository}}"
        gh release upload ${{ github.event.release.tag_name }} "./x86_64-unknown-linux-musl-debug.deb" \
          --clobber \
          --repo="${{github.repository}}"
        gh release upload ${{ github.event.release.tag_name }} "./oci-image-aarch64-unknown-linux-musl.tar.gz" \
          --clobber \
          --repo="${{github.repository}}"
        gh release upload ${{ github.event.release.tag_name }} "./oci-image-aarch64-unknown-linux-musl-debug.tar.gz" \
          --clobber \
          --repo="${{github.repository}}"
        gh release upload ${{ github.event.release.tag_name }} "./oci-image-x86_64-unknown-linux-musl.tar.gz" \
          --clobber \
          --repo="${{github.repository}}"
        gh release upload ${{ github.event.release.tag_name }} "./oci-image-x86_64-unknown-linux-musl-debug.tar.gz" \
          --clobber \
          --repo="${{github.repository}}"
        gh release upload ${{ github.event.release.tag_name }} "./static-aarch64-unknown-linux-musl" \
          --clobber \
          --repo="${{github.repository}}"
        gh release upload ${{ github.event.release.tag_name }} "./static-aarch64-unknown-linux-musl-debug" \
          --clobber \
          --repo="${{github.repository}}"
        gh release upload ${{ github.event.release.tag_name }} "./static-x86_64-unknown-linux-musl" \
          --clobber \
          --repo="${{github.repository}}"
        gh release upload ${{ github.event.release.tag_name }} "./static-x86_64-unknown-linux-musl-debug" \
          --clobber \
          --repo="${{github.repository}}"